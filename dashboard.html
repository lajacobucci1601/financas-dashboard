<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#f0ece3; --card:#fff; --header:#3b2a1a; --bar:#5c3d1e;
  --green:#27ae60; --red:#e74c3c; --blue:#2980b9; --orange:#e67e22;
  --purple:#8e44ad; --text:#2c1a0e; --muted:#8a7060; --border:#ddd3c7;
  --shadow:0 2px 10px rgba(0,0,0,0.07);
}
body { font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:var(--text); }

/* HEADER */
header { background:var(--header); color:#fff; padding:11px 20px; display:flex; align-items:center; justify-content:space-between; }
header h1 { font-size:1.1rem; font-weight:700; }
header .sub { font-size:0.7rem; opacity:.55; }
#lastUpdate { font-size:0.7rem; opacity:.6; }

/* CONTROLS */
.ctrl { background:var(--bar); padding:7px 20px; display:flex; align-items:center; gap:12px; }
.ctrl label { color:rgba(255,255,255,.75); font-size:.72rem; font-weight:600; }
.ctrl select { background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3); border-radius:5px; padding:4px 10px; font-size:.78rem; cursor:pointer; }
.ctrl select option { background:var(--bar); }

/* KPIs — 4 colunas */
.kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; padding:12px 20px 8px; }
.kpi { background:var(--card); border-radius:10px; padding:13px 16px; box-shadow:var(--shadow); border-top:3px solid var(--blue); }
.kpi.red    { border-top-color:var(--red); }
.kpi.green  { border-top-color:var(--green); }
.kpi.orange { border-top-color:var(--orange); }
.kpi.blue   { border-top-color:var(--blue); }
.kpi.purple { border-top-color:var(--purple); }
.kpi-lbl { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; line-height:1.3; }
.kpi-val { font-size:1.3rem; font-weight:700; }
.kpi-sub { font-size:.64rem; color:var(--muted); margin-top:3px; line-height:1.4; }

/* ROWS */
.row1 { display:grid; grid-template-columns:3fr 2fr; gap:10px; padding:0 20px 8px; }
.row2 { display:grid; grid-template-columns:5fr 3fr 4fr; gap:10px; padding:0 20px 18px; }
.card { background:var(--card); border-radius:10px; padding:14px; box-shadow:var(--shadow); }
.card-title { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-weight:600; margin-bottom:10px; padding-bottom:7px; border-bottom:1px solid var(--border); }

/* TABLE */
table { width:100%; border-collapse:collapse; font-size:.73rem; }
thead th { background:var(--header); color:#fff; padding:6px 8px; text-align:left; font-size:.68rem; white-space:nowrap; }
thead th.r { text-align:right; }
tbody tr:nth-child(even) { background:#faf7f3; }
tbody tr:hover { background:#f5efe6; }
tbody td { padding:5px 8px; border-bottom:1px solid #f0ebe4; }
tbody td.r { text-align:right; }
tfoot td { padding:7px 8px; font-weight:700; border-top:2px solid var(--border); font-size:.73rem; }
tfoot td.r { text-align:right; color:var(--red); }
.neg { color:var(--red); }

/* HORIZONTAL BAR */
.hb { display:flex; align-items:center; gap:7px; margin-bottom:6px; }
.hb-lbl { font-size:.68rem; width:95px; text-align:right; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }
.hb-track { flex:1; background:#ede8e0; border-radius:3px; height:14px; }
.hb-fill { height:100%; border-radius:3px; background:var(--green); display:flex; align-items:center; min-width:2px; }
.hb-val { font-size:.6rem; color:#fff; font-weight:700; padding-left:4px; white-space:nowrap; }

/* PIE / INVEST */
.invest-total { text-align:center; margin-bottom:8px; }
.invest-total .val { font-size:1.4rem; font-weight:700; color:var(--green); }
.invest-total .lbl { font-size:.68rem; color:var(--muted); }
.invest-legend { font-size:.65rem; color:var(--muted); text-align:center; margin-top:6px; }

/* LOADING */
.loading { text-align:center; padding:24px; color:var(--muted); font-size:.8rem; }
.spin { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:sp .8s linear infinite; margin:0 auto 7px; }
@keyframes sp { to { transform:rotate(360deg); } }

@media(max-width:900px) {
  .kpi-row { grid-template-columns:repeat(3,1fr); }
  .row1,.row2 { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header>
  <div>
    <h1>💰 Finanças Dashboard</h1>
    <div class="sub">Controle financeiro pessoal</div>
  </div>
  <div id="lastUpdate"></div>
</header>

<div class="ctrl">
  <label>MÊS/ANO</label>
  <select id="selMes" onchange="applyFilter()"><option value="">Todos</option></select>
</div>

<!-- KPIs -->
<div class="kpi-row" id="kpiRow">
  <div class="loading" style="grid-column:1/-1"><div class="spin"></div>Carregando...</div>
</div>
<div id="dbg" style="padding:4px 20px 8px;font-size:.62rem;color:#666;white-space:pre-wrap;font-family:monospace"></div>

<!-- Charts -->
<div class="row1">
  <div class="card">
    <div class="card-title">📊 Espanha € — Plan vs Real (todas as categorias)</div>
    <div style="position:relative;height:280px"><canvas id="cEsp"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title"><img src="https://flagcdn.com/16x12/sa.png" style="vertical-align:middle;margin-right:3px"> Arabia SAR — Plan vs Real</div>
    <div style="position:relative;height:280px"><canvas id="cArab"></canvas></div>
  </div>
</div>

<!-- Bottom -->
<div class="row2">
  <div class="card">
    <div class="card-title">💳 Parcelamentos — Próximos Meses (SAR)</div>
    <div id="parcWrap"><div class="loading"><div class="spin"></div></div></div>
  </div>
  <div class="card">
    <div class="card-title">📈 Investimentos</div>
    <div id="investWrap"><div class="loading"><div class="spin"></div></div></div>
  </div>
  <div class="card">
    <div class="card-title"><img src="https://flagcdn.com/16x12/sa.png" style="vertical-align:middle;margin-right:3px"> Arabia Real — Por Categoria (SAR)</div>
    <div id="arabRealWrap"><div class="loading"><div class="spin"></div></div></div>
  </div>
</div>

<script>
const SHEET_ID = '1xEagjesBVqfq9YjjmbS56X6YzeU_ajDHxZyP7D_y9X4';
const MESES   = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const _ch     = {};

const REMAPS = [
  { test: t => (t['Descricao']||'').toLowerCase().includes('amortizacion de prestamo'), cat: 'Lavanderia' },
  { test: t => Math.abs(parseFloat(t['Valor']||0)) === 70 && t['Grupo'] === 'Espanha',  cat: 'Garagem'   },
];
function applyRemaps(rows) {
  rows.forEach(t => { REMAPS.forEach(r => { if (r.test(t)) t['Categoria'] = r.cat; }); });
}

async function gviz(sheet) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}`;
  const txt = await (await fetch(url)).text();
  const tbl = JSON.parse(txt.match(/setResponse\(([\s\S]*)\)/)[1]).table;
  const hdrs = tbl.cols.map(c => c.label || c.id);
  return tbl.rows.map(r => {
    const o = {};
    r.c.forEach((c,i) => { o[hdrs[i]] = c ? c.v : null; });
    return o;
  });
}

function parseDate(v) {
  if (!v) return null;
  const m = String(v).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (m) return new Date(+m[1],+m[2],+m[3]);
  const m2 = typeof v==='string' && v.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m2) return new Date(+m2[3],+m2[2]-1,+m2[1]);
  return null;
}

function fmtDate(v) {
  const d = parseDate(v);
  return d ? d.toLocaleDateString('pt-BR') : (v ? String(v) : '—');
}

function fmt(n, dec=2) {
  if (n==null || isNaN(+n)) return '—';
  return (+n).toLocaleString('pt-BR',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}

function v(t) { return parseFloat(t['Valor']||0); }

function mkChart(id, cfg) {
  if (_ch[id]) { _ch[id].destroy(); delete _ch[id]; }
  const el = document.getElementById(id);
  if (el) _ch[id] = new Chart(el, cfg);
}

let allTrans=[], allOrc=[], allParc=[], allPortfolio=[], resumo={};

function parseMesAno(val) {
  if (!val) return null;
  const s = String(val);
  const m = s.match(/Date\((\d+),(\d+),\d+\)/);
  if (m) return `${MESES[+m[2]]}/${String(+m[1]).slice(2)}`;
  return s.trim();
}

// Avança N meses a partir de "Mmm/YY" ou "Mmm/YYYY" e retorna "Mmm/YY"
function addMeses(mesAno, n) {
  const [m, y] = mesAno.split('/');
  const fullYear = parseInt(y) < 100 ? 2000 + parseInt(y) : parseInt(y);
  const total = fullYear * 12 + MESES.indexOf(m) + n;
  return `${MESES[total % 12]}/${String(Math.floor(total / 12)).slice(2)}`;
}

// Mapeia texto de periodicidade para número de meses
function parsePeriodo(o) {
  const periStr = String(o['Periodicidade'] || o['periodicidade'] || o['Obs'] || o['obs'] || '').toLowerCase();
  if (/semestral/.test(periStr)) return 6;
  if (/trimestral/.test(periStr)) return 3;
  if (/anual/.test(periStr)) return 12;
  if (/bimestral/.test(periStr)) return 2;
  const pm = periStr.match(/(\d+)/);
  return pm ? parseInt(pm[1]) : null;
}

// Retorna o valor de plano ajustado para despesas periódicas.
// Lê Periodicidade ("Semestral"/"Trimestral"/número) e Mes/Ano (última cobrança).
// Só retorna o valor no mês em que a próxima cobrança cai.
function calcPlanValue(o, currentMesAno) {
  const val = Math.abs(parseFloat(o['Valor'] || 0));
  const ultimaCobranca = parseMesAno(o['Mes/Ano'] || o['Mês/Ano']);
  if (!ultimaCobranca) return val; // sem última cobrança → mensal normal

  const periodo = parsePeriodo(o);
  if (!periodo || periodo <= 1) return val; // mensal normal

  const proxCobranca = addMeses(ultimaCobranca, periodo);
  return proxCobranca === currentMesAno ? val : 0;
}

function getMesAno(t) {
  // Tenta coluna Mes/Ano primeiro (aceita variações de nome)
  const raw = t['Mes/Ano'] || t['Mês/Ano'] || t['MES/ANO'] || t['mes/ano'] || t['Mes/Ano '];
  const fromCol = parseMesAno(raw);
  if (fromCol) return fromCol;
  // Fallback: deriva da coluna Data
  const d = parseDate(t['Data'] || t['data'] || t['DATA']);
  if (d) return `${MESES[d.getMonth()]}/${String(d.getFullYear()).slice(2)}`;
  return null;
}

function buildSel() {
  const set = new Set();
  allTrans.forEach(t => { const ma = getMesAno(t); if (ma) set.add(ma); });
  const sorted = [...set].sort((a,b) => {
    const p = s => { const[m,y]=s.split('/'); return (2000+parseInt(y))*100+MESES.indexOf(m); };
    return p(a)-p(b);
  });
  const sel = document.getElementById('selMes');
  sel.innerHTML = '<option value="">Todos</option>';
  sorted.forEach(ma => sel.appendChild(new Option(ma,ma)));
  if (sorted.length) sel.value = sorted[sorted.length-1];
}

function filtered() {
  const ma = document.getElementById('selMes').value;
  if (!ma) return allTrans;
  return allTrans.filter(t => getMesAno(t) === ma);
}

function renderKPIs(trans) {
  const taxa_sar = resumo['Taxa_EUR_SAR'] || 4.3008;
  const taxa_brl = resumo['Taxa_EUR_BRL'] || 6.2;

  // SAR Total Expenses (mês selecionado):
  //   1) Tudo que é SAB_Card na aba Transacoes (coluna Valor) do mês selecionado
  //   2) + Aluguel (KSA) da aba Orcamento
  //   3) + Compras Parceladas do mês SEGUINTE ao selecionado (aba Parcelamentos)
  // (addN e parcForMes são declaradas mais abaixo — function declarations são içadas/hoisted)
  const selMesSAR = document.getElementById('selMes').value;
  const sabCardSAR = Math.abs(trans
    .filter(t => (t['Conta']||t['conta'])==='SAB_Card')
    .reduce((s,t) => s+v(t), 0));
  // Aluguel KSA: na aba Orcamento o nome "Aluguel (KSA)" fica na coluna Sub_Descricao
  // (a coluna Descricao tem a categoria, ex: "Moradia (Fixo)"). Busca robusta por
  // "aluguel" + "ksa" em Sub_Descricao/Descricao.
  const aluguelKSA = allOrc
    .filter(o => {
      const d = (o['Sub_Descricao']||o['Descricao']||'').toLowerCase();
      return d.includes('aluguel') && d.includes('ksa');
    })
    .reduce((s,o) => s+Math.abs(parseFloat(o['Valor']||0)), 0);
  const parcSeguinteSAR = parcForMes(addN(selMesSAR, 1));
  const totSAR = sabCardSAR + aluguelKSA + parcSeguinteSAR;

  // EUR Saldo (mês selecionado): Grupo="Espanha" + Conta="BBVA", soma de TODOS os valores
  // (positivos e negativos) EXCETO linhas cujo Sub_Categoria (col F) seja "Salário"
  const totEUR = trans
    .filter(t => t['Grupo']==='Espanha' && (t['Conta']||t['conta'])==='BBVA'
      && (t['Sub_Categoria']||'')!=='Salário')
    .reduce((s,t) => s+v(t), 0);

  // Receita real = transações positivas em Espanha excluindo Extras (não é salário)
  const receitasRealTotal = trans.filter(t => t['Grupo']==='Espanha' && v(t)>0 && (t['Categoria']||'')!=='Extras')
    .reduce((s,t) => s+v(t), 0);
  const receitasOrcTotal = allOrc.filter(o => o['Grupo']==='Receita' && o['Ativo']==='Sim')
    .reduce((s,o) => s+Math.abs(parseFloat(o['Valor']||0)), 0);
  const receitaAtual = receitasRealTotal > 0 ? receitasRealTotal : receitasOrcTotal;

  // Saldo atualizado (real até agora): soma de TODOS os valores da Conta="BBVA" do mês,
  // independente do Grupo — assim inclui o Salário (que cai no BBVA, mas tem Grupo
  // "Arabia Saudita"). É o totEUR (despesas Espanha/BBVA) + as entradas de salário.
  const saldoAtual = trans
    .filter(t => (t['Conta']||t['conta'])==='BBVA')
    .reduce((s,t) => s+v(t), 0);

  // Previsto não debitado: compara Orcamento (Grupo "Espanha") com Transacoes (Grupo "Espanha"),
  // casando pelo Sub_Descricao (Orcamento) ↔ Sub_Categoria (Transacoes). Para cada item planejado,
  // se o que já saiu nas Transacoes for menor que o planejado, a diferença ainda não foi debitada.
  const currentMesAno = document.getElementById('selMes').value;
  const planBySub = {};
  allOrc.filter(o => o['Grupo']==='Espanha' && o['Moeda']==='EUR' && o['Ativo']==='Sim'
      && !(o['Descricao']||'').toLowerCase().includes('receita'))  // exclui linhas de Receita
    .forEach(o => {
      const k = o['Sub_Descricao']||o['Descricao']||'Outros';
      // Coluna H (Mes/Ano): vazia = despesa mensal (conta todo mês);
      // preenchida = só conta no mês indicado (ex: anual/semestral/único).
      const ma = parseMesAno(o['Mes/Ano']||o['Mês/Ano']);
      const plan = (!ma || ma===currentMesAno) ? Math.abs(parseFloat(o['Valor']||0)) : 0;
      planBySub[k] = (planBySub[k]||0) + plan;
    });
  const realBySub = {};
  trans.filter(t => t['Grupo']==='Espanha')
    .forEach(t => { const k=t['Sub_Categoria']||t['Categoria']||'Outros'; realBySub[k]=(realBySub[k]||0)+v(t); });
  let prevNaoDebit = 0;
  const dbgLines = [];
  Object.entries(planBySub).forEach(([k, plan]) => {
    if (plan<=0) return;
    const realSpent = Math.max(0, -(realBySub[k]||0));
    const naoDeb = realSpent < plan ? plan - realSpent : 0;
    if (naoDeb>0) prevNaoDebit += naoDeb;
    dbgLines.push(`${k.padEnd(38).slice(0,38)} plan=${plan.toFixed(2).padStart(9)} real=${realSpent.toFixed(2).padStart(9)} naoDeb=${naoDeb.toFixed(2).padStart(9)}`);
  });
  const saldoPrev = saldoAtual - prevNaoDebit;
  const dbgEl = document.getElementById('dbg');
  if (dbgEl) dbgEl.textContent =
    `DEBUG mês=${currentMesAno}  saldoAtual=${saldoAtual.toFixed(2)}  prevNaoDebit=${prevNaoDebit.toFixed(2)}  saldoPrev=${saldoPrev.toFixed(2)}\n`
    + `--- Itens planejados (Orcamento Espanha) que entram no mês ---\n` + dbgLines.join('\n');

  // Próximo mês: receitas planejadas − todas despesas planejadas (EUR + SAR + BRL)
  // Periódicos só no mês devido. Parcelas = mês exibido + 1.
  function mesIdxFn(mesAno) {
    const [m, y] = mesAno.split('/');
    const fy = parseInt(y) < 100 ? 2000+parseInt(y) : parseInt(y);
    return fy*12 + MESES.indexOf(m);
  }
  function addN(sel, n) {
    if (!sel) return null;
    const [m, y] = sel.split('/');
    const fy = parseInt(y) < 100 ? 2000+parseInt(y) : parseInt(y);
    const t = fy*12 + MESES.indexOf(m) + n;
    return `${MESES[t%12]}/${String(Math.floor(t/12)).slice(2)}`;
  }
  const mesProx = addN(currentMesAno, 1);
  const mesParc = addN(currentMesAno, 2);

  function parcForMes(target) {
    if (!target) return 0;
    const tgt = mesIdxFn(target);
    const now = new Date(); const nowIdx = now.getFullYear()*12+now.getMonth();
    return allParc.filter(p => p['Ativo']==='Sim').reduce((s,p) => {
      const sar=Math.abs(parseFloat(p['Valor_SAR']||0));
      const cur=parseInt(p['Parcela_Atual']||1), tot=parseInt(p['Total_Parcelas']||1), left=tot-cur+1;
      const mi=(p['Inicio']||p['Mes_Inicio']||'').trim();
      const start = mi ? mesIdxFn(mi) : nowIdx;
      return (tgt>=start && tgt<start+left) ? s+sar : s;
    }, 0);
  }

  const gordaEspOrc = allOrc.filter(o => o['Grupo']==='GordaEspanha' && o['Moeda']==='EUR' && o['Ativo']==='Sim')
    .reduce((s,o) => s+Math.abs(parseFloat(o['Valor']||0)), 0);
  const gordaBraOrc = allOrc.filter(o => o['Grupo']==='GordaBrasil' && o['Moeda']==='EUR' && o['Ativo']==='Sim')
    .reduce((s,o) => s+Math.abs(parseFloat(o['Valor']||0)), 0);
  const brlTotal = allOrc.filter(o => o['Moeda']==='BRL' && o['Ativo']==='Sim')
    .reduce((s,o) => s+Math.abs(parseFloat(o['Valor']||0)), 0);
  const espProxEUR = allOrc.filter(o => o['Grupo']==='Espanha' && o['Moeda']==='EUR' && o['Ativo']==='Sim')
    .reduce((s,o) => s+calcPlanValue(o, mesProx||currentMesAno), 0);
  const arabSAR = allOrc.filter(o => o['Grupo']==='Arabia' && o['Moeda']==='SAR' && o['Ativo']==='Sim' && o['Descricao']!=='Compras Parceladas')
    .reduce((s,o) => s+Math.abs(parseFloat(o['Valor']||0)), 0);
  const parcProxSAR = parcForMes(mesParc);

  const saldoProx = receitasOrcTotal - gordaEspOrc - espProxEUR - gordaBraOrc
                  - (arabSAR/taxa_sar) - (parcProxSAR/taxa_sar) - (brlTotal/taxa_brl);

  const proxLabel = mesProx || 'próximo';
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi red"><div class="kpi-lbl"><img src="https://flagcdn.com/16x12/sa.png" style="vertical-align:middle;margin-right:3px"> Total Expenses<br>Saudi Arabia (mês atual)</div><div class="kpi-val">${fmt(totSAR,0)} SAR</div><div class="kpi-sub">SAB_Card do mês + Aluguel (KSA) + Parcelas ${addN(selMesSAR,1)||''}</div></div>
    <div class="kpi orange"><div class="kpi-lbl"><img src="https://flagcdn.com/16x12/es.png" style="vertical-align:middle;margin-right:3px"> Total Expenses<br>Spain (até o momento)</div><div class="kpi-val">€ ${fmt(totEUR,2)}</div><div class="kpi-sub">BBVA — saldo do mês (sem Salário)</div></div>
    <div class="kpi green"><div class="kpi-lbl">💶 Balance Spain<br>(real até agora)</div><div class="kpi-val">€ ${fmt(saldoAtual,2)}</div><div class="kpi-sub">BBVA — saldo do mês (com Salário)</div></div>
    <div class="kpi blue"><div class="kpi-lbl">🔮 Balance Spain<br>(real + previsto mês)</div><div class="kpi-val">€ ${fmt(saldoPrev,2)}</div><div class="kpi-sub">Saldo real − Previsto não debitado (€ ${fmt(prevNaoDebit,2)})</div></div>
    <div class="kpi purple"><div class="kpi-lbl">📅 Balance Spain<br>(${proxLabel})</div><div class="kpi-val">€ ${fmt(saldoProx,2)}</div><div class="kpi-sub">Receitas orc. − Esp − GordaEsp − Arabia SAR − Parc.${mesParc||''} − BRL − GordaBra</div></div>`;
}

function renderEspanha(trans) {
  const currentMesAno = document.getElementById('selMes').value;
  const taxa_sar = resumo['Taxa_EUR_SAR'] || 4.3008;
  const taxa_brl = resumo['Taxa_EUR_BRL'] || 6.2;
  const planMap = {};

  // Espanha EUR + GordaEspanha + GordaBrasil
  allOrc
    .filter(o => ['Espanha','GordaEspanha','GordaBrasil'].includes(o['Grupo']) && o['Moeda']==='EUR')
    .forEach(o => {
      const cat = o['Descricao'] || 'Outros';
      planMap[cat] = (planMap[cat]||0) + calcPlanValue(o, currentMesAno);
    });

  // Pensao Enzo em BRL convertida para EUR
  allOrc.filter(o => o['Moeda']==='BRL' && o['Ativo']==='Sim').forEach(o => {
    const cat = o['Descricao'] || 'Outros';
    const val = Math.abs(parseFloat(o['Valor']||0)) / taxa_brl;
    planMap[cat] = (planMap[cat]||0) + val;
  });

  const realRaw = {};
  trans
    .filter(t => t['Grupo']==='Espanha')
    .forEach(t => {
      const cat = t['Categoria']||'Outros';
      realRaw[cat] = (realRaw[cat]||0) + v(t);
    });
  const realMap = {};
  Object.entries(realRaw).forEach(([c, net]) => { if (net < 0) realMap[c] = Math.abs(net); });

  const cats = [...new Set([...Object.keys(planMap),...Object.keys(realMap)])]
    .filter(c => !c.toLowerCase().includes('receita'))
    .sort((a,b) => (planMap[b]||0)-(planMap[a]||0));
  mkChart('cEsp',{type:'bar',data:{labels:cats,datasets:[{label:'Real (€)',data:cats.map(c=>realMap[c]||0),backgroundColor:'rgba(231,76,60,0.8)',borderRadius:3},{label:'Plan (€)',data:cats.map(c=>planMap[c]||0),backgroundColor:'rgba(39,174,96,0.7)',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10}}}},scales:{x:{grid:{display:false},ticks:{font:{size:8},maxRotation:45}},y:{grid:{color:'#eee'},ticks:{callback:n=>'€'+fmt(n,0)}}}}});
}

function renderArabia(trans) {
  const planMap = {};
  const parcTotal = allParc.filter(p => p['Ativo']==='Sim').reduce((s,p) => s+Math.abs(parseFloat(p['Valor_SAR']||0)), 0);
  allOrc.filter(o => o['Grupo']==='Arabia' && o['Moeda']==='SAR').forEach(o => {
    const cat = o['Descricao'] || 'Outros';
    let val = Math.abs(parseFloat(o['Valor']||0));
    if (cat==='Compras Parceladas') val = parcTotal;
    planMap[cat] = (planMap[cat]||0) + val;
  });
  const realRaw = {};
  trans.filter(t => t['Grupo']==='Arabia Saudita' || t['Moeda_Class']==='SAR').forEach(t => {
    const cat = t['Categoria']||'Outros';
    realRaw[cat] = (realRaw[cat]||0) + v(t);
  });
  const realMap = {};
  Object.entries(realRaw).forEach(([c,val]) => { if (val<0) realMap[c]=Math.abs(val); });
  const cats = [...new Set([...Object.keys(planMap),...Object.keys(realMap)])].filter(c => !c.toLowerCase().includes('receita')).sort((a,b) => (planMap[b]||0)-(planMap[a]||0));
  mkChart('cArab',{type:'bar',options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10}}}},scales:{x:{grid:{display:false},ticks:{font:{size:8},maxRotation:45}},y:{grid:{color:'#eee'},ticks:{callback:n=>fmt(n,0)}}}},data:{labels:cats,datasets:[{label:'Real (SAR)',data:cats.map(c=>realMap[c]||0),backgroundColor:'rgba(231,76,60,0.8)',borderRadius:3},{label:'Plan (SAR)',data:cats.map(c=>planMap[c]||0),backgroundColor:'rgba(39,174,96,0.7)',borderRadius:3}]}});
}

function renderParc() {
  const active = allParc.filter(p => p['Ativo']==='Sim');
  if (!active.length) { document.getElementById('parcWrap').innerHTML='<div style="padding:16px;text-align:center;color:var(--muted)">Nenhum parcelamento ativo</div>'; return; }
  const now = new Date();
  const cols = [];
  for (let i=0;i<6;i++) { const d=new Date(now.getFullYear(),now.getMonth()+i,2); cols.push(`${MESES[d.getMonth()]}/${String(d.getFullYear()).slice(2)}`); }
  function startOffset(p) {
    const mi = (p['Inicio']||p['Mes_Inicio']||'').trim();
    if (!mi) return 0;
    const [mm,yy] = mi.split('/');
    const mIdx = MESES.indexOf(mm);
    if (mIdx<0) return 0;
    const diff = (2000+parseInt(yy)-now.getFullYear())*12 + mIdx - now.getMonth();
    return Math.max(0,diff);
  }
  const tots = new Array(6).fill(0);
  const rows = active.map(p => {
    const sar=Math.abs(parseFloat(p['Valor_SAR']||0)),cur=parseInt(p['Parcela_Atual']||1),tot=parseInt(p['Total_Parcelas']||1),left=tot-cur+1,offset=startOffset(p);
    const cells=cols.map((_,i)=>{if(i>=offset&&i<offset+left){tots[i]+=sar;return `<td class="r neg">${fmt(sar,0)}</td>`;}return `<td class="r" style="color:var(--muted)">—</td>`;});
    const desc=p['Descricao']||'—';
    return `<tr><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${desc}">${desc}</td><td class="r">${cur}/${tot}</td><td class="r">${fmt(sar*tot,0)}</td>${cells.join('')}</tr>`;
  }).join('');
  document.getElementById('parcWrap').innerHTML=`<table><thead><tr><th>Item</th><th class="r">Parc.</th><th class="r">Total</th>${cols.map(c=>`<th class="r">${c}</th>`).join('')}</tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="3">Total SAR/mês</td>${tots.map(t=>`<td class="r">${fmt(t,0)}</td>`).join('')}</tr></tfoot></table>`;
}

const PALETTE = ['#4A90D9','#F5A623','#7ED321','#F7931A','#9B59B6','#1ABC9C','#E74C3C','#3498DB','#E67E22','#2ECC71','#E91E63','#00BCD4','#FF5722','#607D8B','#8BC34A','#FFC107','#795548','#9E9E9E'];

function renderInvest() {
  const ativos = allPortfolio.filter(p => p['Ativo'] && parseFloat(p['Valor_EUR']||0)>0).sort((a,b)=>parseFloat(b['Valor_EUR']||0)-parseFloat(a['Valor_EUR']||0));
  const totalPort = ativos.reduce((s,p)=>s+parseFloat(p['Valor_EUR']||0),0);
  const total = totalPort || resumo['Saldo_Poupanca_EUR']||0;
  const falta=resumo['Falta_Meta_EUR']||0,pct=Math.min((total/200000)*100,100),meses=resumo['Meses_Para_Meta']||0,previsao=resumo['Previsao_Meta']||'—',ritmo=resumo['Ritmo_Jan2028_EUR']||0;

  const donutHtml = ativos.length ? `
    <div style="display:flex;align-items:center;gap:10px;margin:10px 0">
      <div style="position:relative;width:110px;height:110px;flex-shrink:0">
        <canvas id="cPortfolio" width="110" height="110"></canvas>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none">
          <div style="font-size:.7rem;font-weight:700;color:var(--text)">€ ${fmt(totalPort,0)}</div>
          <div style="font-size:.55rem;color:var(--muted)">Positions</div>
        </div>
      </div>
      <div style="flex:1;max-height:110px;overflow-y:auto;font-size:.6rem;line-height:1.7">
        ${ativos.map((p,i)=>{
          const val=parseFloat(p['Valor_EUR']||0);
          const pct=(val/totalPort*100).toFixed(2);
          const cor=p['Cor']||PALETTE[i%PALETTE.length];
          return `<div style="display:flex;align-items:center;gap:4px">
            <span style="width:8px;height:8px;border-radius:50%;background:${cor};flex-shrink:0;display:inline-block"></span>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)" title="${p['Ativo']}">${p['Ativo']}</span>
            <span style="color:var(--muted);flex-shrink:0">${pct}%</span>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  document.getElementById('investWrap').innerHTML=`
  <div class="invest-total"><div class="val">€ ${fmt(total,0)}</div><div class="lbl">Poupança atual</div></div>
  <div style="background:#ede8e0;border-radius:8px;height:10px;margin:6px 0"><div style="background:var(--green);border-radius:8px;height:10px;width:${pct}%"></div></div>
  <div style="font-size:.67rem;color:var(--muted);line-height:1.6">
    <div>📌 Falta: <b>€ ${fmt(falta,0)}</b> para meta €200k</div>
    <div>📅 Previsão: <b>${previsao}</b> (${fmt(meses,1)} meses)</div>
    <div>⚡ Ritmo p/ Jan/2028: <b>€ ${fmt(ritmo,0)}/mês</b></div>
  </div>
  ${donutHtml}`;

  if (ativos.length) {
    const colors = ativos.map((p,i) => p['Cor']||PALETTE[i%PALETTE.length]);
    mkChart('cPortfolio',{
      type:'doughnut',
      data:{
        labels: ativos.map(p=>p['Ativo']),
        datasets:[{data:ativos.map(p=>parseFloat(p['Valor_EUR']||0)),backgroundColor:colors,borderWidth:1,borderColor:'#fff'}]
      },
      options:{
        responsive:false,
        cutout:'70%',
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const vv=ctx.parsed;const pc=(vv/totalPort*100).toFixed(1);return ` ${ctx.label}: € ${fmt(vv,0)} (${pc}%)`;}}}},
        animation:{duration:600}
      }
    });
  }
}

function renderArabReal(trans) {
  const raw = {};
  trans.filter(t => t['Moeda_Class']==='SAR').forEach(t => {
    const cat=t['Categoria']||'Outros';
    raw[cat]=(raw[cat]||0)+v(t);
  });
  const sorted=Object.entries(raw).filter(([,v])=>v<0).map(([c,v])=>[c,Math.abs(v)]).sort((a,b)=>b[1]-a[1]).slice(0,14);
  if (!sorted.length) { document.getElementById('arabRealWrap').innerHTML='<div style="padding:16px;text-align:center;color:var(--muted)">Sem dados SAR</div>'; return; }
  const max=sorted[0][1];
  document.getElementById('arabRealWrap').innerHTML=sorted.map(([cat,val])=>`<div class="hb"><div class="hb-lbl" title="${cat}">${cat}</div><div class="hb-track"><div class="hb-fill" style="width:${(val/max)*100}%"><span class="hb-val">${fmt(val,0)}</span></div></div></div>`).join('');
}

function applyFilter() {
  const trans=filtered();
  renderKPIs(trans);
  renderEspanha(trans);
  renderArabia(trans);
  renderArabReal(trans);
}

async function init() {
  try {
    [allTrans,allOrc,allParc,allPortfolio]=await Promise.all([gviz('Transacoes'),gviz('Orcamento'),gviz('Parcelamentos'),gviz('Portfolio').catch(()=>[])]);
    applyRemaps(allTrans);
    const resumoRows=await gviz('Resumo');
    resumo=resumoRows.length?resumoRows[resumoRows.length-1]:{};
    const att=resumo['Data_Atualizacao'];
    if(att) document.getElementById('lastUpdate').textContent='Atualizado: '+fmtDate(att);
    buildSel();
    applyFilter();
    renderParc();
    renderInvest();
  } catch(e) {
    console.error(e);
    document.getElementById('kpiRow').innerHTML=`<div style="color:var(--red);padding:20px;grid-column:1/-1">❌ Erro ao carregar. Verifique se a planilha está pública.<br><small>${e.message}</small></div>`;
  }
}

init();
</script>
