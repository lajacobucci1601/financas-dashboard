<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finan脙搂as Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#f0ece3; --card:#fff; --header:#3b2a1a; --bar:#5c3d1e;
  --green:#27ae60; --red:#e74c3c; --blue:#2980b9; --orange:#e67e22;
  --purple:#8e44ad; --text:#2c1a0e; --muted:#8a7060; --border:#ddd3c7;
  --shadow:0 2px 10px rgba(0,0,0,0.07);
}
body { font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:var(--text); }

/* HEADER */
header { background:var(--header); color:#fff; padding:11px 20px; display:flex; align-items:center; justify-content:space-between; }
header h1 { font-size:1.1rem; font-weight:700; }
header .sub { font-size:0.7rem; opacity:.55; }
#lastUpdate { font-size:0.7rem; opacity:.6; }

/* CONTROLS */
.ctrl { background:var(--bar); padding:7px 20px; display:flex; align-items:center; gap:12px; }
.ctrl label { color:rgba(255,255,255,.75); font-size:.72rem; font-weight:600; }
.ctrl select { background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3); border-radius:5px; padding:4px 10px; font-size:.78rem; cursor:pointer; }
.ctrl select option { background:var(--bar); }

/* KPIs 芒聙聰 4 colunas */
.kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:12px 20px 8px; }
.kpi { background:var(--card); border-radius:10px; padding:13px 16px; box-shadow:var(--shadow); border-top:3px solid var(--blue); }
.kpi.red    { border-top-color:var(--red); }
.kpi.green  { border-top-color:var(--green); }
.kpi.orange { border-top-color:var(--orange); }
.kpi.purple { border-top-color:var(--purple); }
.kpi-lbl { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; line-height:1.3; }
.kpi-val { font-size:1.3rem; font-weight:700; }
.kpi-sub { font-size:.64rem; color:var(--muted); margin-top:3px; line-height:1.4; }

/* ROWS */
.row1 { display:grid; grid-template-columns:3fr 2fr; gap:10px; padding:0 20px 8px; }
.row2 { display:grid; grid-template-columns:5fr 3fr 4fr; gap:10px; padding:0 20px 18px; }
.card { background:var(--card); border-radius:10px; padding:14px; box-shadow:var(--shadow); }
.card-title { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-weight:600; margin-bottom:10px; padding-bottom:7px; border-bottom:1px solid var(--border); }

/* TABLE */
table { width:100%; border-collapse:collapse; font-size:.73rem; }
thead th { background:var(--header); color:#fff; padding:6px 8px; text-align:left; font-size:.68rem; white-space:nowrap; }
thead th.r { text-align:right; }
tbody tr:nth-child(even) { background:#faf7f3; }
tbody tr:hover { background:#f5efe6; }
tbody td { padding:5px 8px; border-bottom:1px solid #f0ebe4; }
tbody td.r { text-align:right; }
tfoot td { padding:7px 8px; font-weight:700; border-top:2px solid var(--border); font-size:.73rem; }
tfoot td.r { text-align:right; color:var(--red); }
.neg { color:var(--red); }

/* HORIZONTAL BAR */
.hb { display:flex; align-items:center; gap:7px; margin-bottom:6px; }
.hb-lbl { font-size:.68rem; width:95px; text-align:right; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }
.hb-track { flex:1; background:#ede8e0; border-radius:3px; height:14px; }
.hb-fill { height:100%; border-radius:3px; background:var(--green); display:flex; align-items:center; min-width:2px; }
.hb-val { font-size:.6rem; color:#fff; font-weight:700; padding-left:4px; white-space:nowrap; }

/* PIE / INVEST */
.invest-total { text-align:center; margin-bottom:8px; }
.invest-total .val { font-size:1.4rem; font-weight:700; color:var(--green); }
.invest-total .lbl { font-size:.68rem; color:var(--muted); }
.invest-legend { font-size:.65rem; color:var(--muted); text-align:center; margin-top:6px; }

/* LOADING */
.loading { text-align:center; padding:24px; color:var(--muted); font-size:.8rem; }
.spin { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:sp .8s linear infinite; margin:0 auto 7px; }
@keyframes sp { to { transform:rotate(360deg); } }

@media(max-width:900px) {
  .kpi-row { grid-template-columns:repeat(2,1fr); }
  .row1,.row2 { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<script>
const SHEET_ID = '1xEagjesBVqfq9YjjmbS56X6YzeU_ajDHxZyP7D_y9X4';
const MESES   = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const _ch     = {};

// 芒聰聙芒聰聙 utils 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function gviz(sheet) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}&range=A1:Z5000`;
  const txt = await (await fetch(url)).text();
  const tbl = JSON.parse(txt.match(/setResponse\(([\s\S]*)\)/)[1]).table;
  const hdrs = tbl.cols.map(c => c.label || c.id);
  return tbl.rows.map(r => {
    const o = {};
    r.c.forEach((c,i) => { o[hdrs[i]] = c ? c.v : null; });
    return o;
  });
}

function parseDate(v) {
  if (!v) return null;
  const m = String(v).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (m) return new Date(+m[1],+m[2],+m[3]);
  const m2 = typeof v==='string' && v.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m2) return new Date(+m2[3],+m2[2]-1,+m2[1]);
  return null;
}

function fmtDate(v) {
  const d = parseDate(v);
  return d ? d.toLocaleDateString('pt-BR') : (v ? String(v) : '芒聙聰');
}

function fmt(n, dec=2) {
  if (n==null || isNaN(+n)) return '芒聙聰';
  return (+n).toLocaleString('pt-BR',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}

function v(t) { return parseFloat(t['Valor']||0); }

function mkChart(id, cfg) {
  if (_ch[id]) { _ch[id].destroy(); delete _ch[id]; }
  const el = document.getElementById(id);
  if (el) _ch[id] = new Chart(el, cfg);
}

// 芒聰聙芒聰聙 global data 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
let allTrans=[], allOrc=[], allParc=[], resumo={};

// 芒聰聙芒聰聙 selectors 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function buildSel() {
  const set = new Set();
  allTrans.forEach(t => { if (t['Mes/Ano']) set.add(String(t['Mes/Ano'])); });
  const sorted = [...set].sort((a,b) => {
    const p = s => { const[m,y]=s.split('/'); return (2000+parseInt(y))*100+MESES.indexOf(m); };
    return p(a)-p(b);
  });
  const sel = document.getElementById('selMes');
  sel.innerHTML = '<option value="">Todos</option>';
  sorted.forEach(ma => sel.appendChild(new Option(ma,ma)));
  if (sorted.length) sel.value = sorted[sorted.length-1];
}

function filtered() {
  const ma = document.getElementById('selMes').value;
  if (!ma) return allTrans;
  return allTrans.filter(t => String(t['Mes/Ano']||'') === ma);
}

// 芒聰聙芒聰聙 KPIs 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function renderKPIs(trans) {
  const taxa_sar = resumo['Taxa_EUR_SAR'] || 4.3008;

  // 1. Arabia SAR 芒聙聰 apenas despesas (negativas), sem cr脙漏ditos/revers脙碌es
  const totSAR = trans
    .filter(t => t['Tipo']==='Cartao Credito' && v(t)<0)
    .reduce((s,t) => s+Math.abs(v(t)), 0);

  // 2. Total Espanha EUR 芒聙聰 apenas despesas "puras" (exclui Gorda/Pensao, que s脙拢o or脙搂amentos separados)
  const EXCL_EUR = ['GordaEspanha','GordaBrasil','PensaoEnzo'];
  const totEUR = trans
    .filter(t => t['Pais/Conta']==='Espanha' && v(t)<0 && !EXCL_EUR.includes(t['Categoria']||''))
    .reduce((s,t) => s+Math.abs(v(t)), 0);

  // Valores reais de Gorda/Pensao no m脙陋s (para saldo)
  const gordaEspReal = trans.filter(t=>t['Categoria']==='GordaEspanha'&&v(t)<0).reduce((s,t)=>s+Math.abs(v(t)),0);
  const gordaBraReal = trans.filter(t=>t['Categoria']==='GordaBrasil'&&v(t)<0).reduce((s,t)=>s+Math.abs(v(t)),0);
  const pensaoReal   = trans.filter(t=>t['Categoria']==='PensaoEnzo'&&v(t)<0).reduce((s,t)=>s+Math.abs(v(t)),0);

  // 芒聰聙芒聰聙 Or脙搂amento EUR 芒聰聙芒聰聙
  const salarioEUR  = resumo['Receita_Salario_EUR'] || allOrc.filter(o=>o['Grupo']==='Receita'&&o['Descricao']==='Salario EUR').reduce((s,o)=>s+Math.abs(parseFloat(o['Valor']||0)),0);
  const gordaEspEUR = resumo['GordaEspanha_EUR_Orc'] || 0;
  const gordaBraEUR = resumo['GordaBrasil_EUR_Orc']  || 0;
  const pensaoEUR   = resumo['PensaoEnzo_EUR_Orc']   || 0;
  const valiEUR     = resumo['Valeria_Net_EUR']       || 0;
  const espOrcEUR   = resumo['Espanha_EUR_Orc']       || allOrc.filter(o=>o['Grupo']==='Espanha'&&o['Moeda']==='EUR').reduce((s,o)=>s+Math.abs(parseFloat(o['Valor']||0)),0);

  // 3. Saldo atual = Sal脙隆rio 芒聢聮 Espanha real 芒聢聮 GordaEsp real 芒聢聮 GordaBra real 芒聢聮 Pensao real 芒聢聮 Valeria
  const saldoAtual = salarioEUR - totEUR - gordaEspReal - gordaBraReal - pensaoReal - valiEUR;

  // 4. Pr脙鲁ximo m脙陋s = Sal脙隆rio 芒聢聮 Espanha orc 芒聢聮 GordaEspanha orc 芒聢聮 GordaBrasil orc 芒聢聮 Pensao orc 芒聢聮 Valeria
  const saldoProx = salarioEUR - espOrcEUR - gordaEspEUR - pensaoEUR - valiEUR - gordaBraEUR;

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi red">
      <div class="kpi-lbl">冒聼聡赂冒聼聡娄 Total Expenses<br>Saudi Arabia (m脙陋s atual)</div>
      <div class="kpi-val">${fmt(totSAR,0)} SAR</div>
      <div class="kpi-sub">Ciclo SAB 芒聙聰 l脙颅quido (excl. parcelamentos)</div>
    </div>
    <div class="kpi orange">
      <div class="kpi-lbl">冒聼聡陋冒聼聡赂 Total Expenses<br>Spain (at脙漏 o momento)</div>
      <div class="kpi-val">芒聜卢 ${fmt(totEUR,2)}</div>
      <div class="kpi-sub">BBVA 芒聙聰 despesas do m脙陋s</div>
    </div>
    <div class="kpi green">
      <div class="kpi-lbl">冒聼聮露 Total Balance Spain<br>(m脙陋s atual)</div>
      <div class="kpi-val">芒聜卢 ${fmt(saldoAtual,2)}</div>
      <div class="kpi-sub">Sal脙隆rio 芒聢聮 GordaEsp 芒聢聮 Espanha real 芒聢聮 Pens脙拢o 芒聢聮 Valeria 芒聢聮 GordaBra</div>
    </div>
    <div class="kpi purple">
      <div class="kpi-lbl">冒聼聯聟 Total Balance Spain<br>(pr脙鲁ximo m脙陋s)</div>
      <div class="kpi-val">芒聜卢 ${fmt(saldoProx,2)}</div>
      <div class="kpi-sub">Sal脙隆rio 芒聢聮 GordaEsp 芒聢聮 Esp.orc 芒聢聮 Pens脙拢o 芒聢聮 Valeria 芒聢聮 GordaBra 芒聢聮 Parc.</div>
    </div>`;
}

// 芒聰聙芒聰聙 CHART: ESPANHA 芒聙聰 Plan vs Real (Espanha + GordaEspanha) 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
// Plan: Orcamento grupos Espanha + GordaEspanha (EUR apenas)
// Real: transa脙搂脙碌es BBVA (Pais/Conta=Espanha, val<0) excl. GordaBrasil/PensaoEnzo
function renderEspanha(trans) {
  // 芒聰聙 Plan 芒聰聙 (apenas Espanha e GordaEspanha; sem GordaBrasil/PensaoEnzo)
  const planMap = {};
  allOrc
    .filter(o => ['Espanha','GordaEspanha'].includes(o['Grupo']) && o['Moeda']==='EUR')
    .forEach(o => {
      const cat = o['Descricao'] || 'Outros';
      planMap[cat] = (planMap[cat]||0) + Math.abs(parseFloat(o['Valor']||0));
    });

  // 芒聰聙 Real 芒聰聙 (exclui categorias GordaBrasil e PensaoEnzo do BBVA)
  const EXCL_CATS = ['Gorda Brasil','Pensao Enzo','GordaBrasil','PensaoEnzo'];
  const realMap = {};
  trans
    .filter(t => t['Pais/Conta']==='Espanha' && v(t)<0
      && !EXCL_CATS.includes(t['Categoria']||''))
    .forEach(t => {
      const cat = t['Categoria']||'Outros';
      realMap[cat] = (realMap[cat]||0) + Math.abs(v(t));
    });

  // Combina e ordena por plan desc
  const cats = [...new Set([...Object.keys(planMap),...Object.keys(realMap)])]
    .sort((a,b) => (planMap[b]||0)-(planMap[a]||0));

  mkChart('cEsp', {
    type:'bar',
    data:{
      labels: cats,
      datasets:[
        { label:'Real (芒聜卢)', data:cats.map(c=>realMap[c]||0), backgroundColor:'rgba(231,76,60,0.8)', borderRadius:3 },
        { label:'Plan (芒聜卢)', data:cats.map(c=>planMap[c]||0), backgroundColor:'rgba(39,174,96,0.7)', borderRadius:3 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{size:10}}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:8},maxRotation:45}},
        y:{grid:{color:'#eee'},ticks:{callback:n=>'芒聜卢'+fmt(n,0)}}
      }
    }
  });
}

// 芒聰聙芒聰聙 CHART: ARABIA 芒聙聰 Plan vs Real 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function renderArabia(trans) {
  // 芒聰聙 Plan (Orcamento Arabia) 芒聰聙
  const planMap = {};
  // Parcelamentos total para "Compras Parceladas"
  const parcTotal = allParc
    .filter(p => p['Ativo']==='Sim')
    .reduce((s,p) => s+Math.abs(parseFloat(p['Valor_SAR']||0)), 0);

  allOrc
    .filter(o => o['Grupo']==='Arabia' && o['Moeda']==='SAR')
    .forEach(o => {
      const cat = o['Descricao']||'Outros';
      let val = Math.abs(parseFloat(o['Valor']||0));
      if (cat==='Compras Parceladas') val = parcTotal;
      planMap[cat] = (planMap[cat]||0) + val;
    });
  // Sal脙隆rio SAR removido do gr脙隆fico (distorce escala)

  // 芒聰聙 Real 芒聰聙 (apenas despesas negativas por categoria)
  const realMap = {};
  trans
    .filter(t => ((t['Pais/Conta']||'').includes('Arabia') || t['Moeda']==='SAR') && v(t)<0)
    .forEach(t => {
      const cat = t['Categoria']||'Outros';
      realMap[cat] = (realMap[cat]||0) + Math.abs(v(t));
    });

  const cats = [...new Set([...Object.keys(planMap),...Object.keys(realMap)])]
    .sort((a,b) => (planMap[b]||0)-(planMap[a]||0));

  mkChart('cArab', {
    type:'bar',
    data:{
      labels: cats,
      datasets:[
        { label:'Real (SAR)', data:cats.map(c=>realMap[c]||0), backgroundColor:'rgba(231,76,60,0.8)', borderRadius:3 },
        { label:'Plan (SAR)', data:cats.map(c=>planMap[c]||0), backgroundColor:'rgba(39,174,96,0.7)', borderRadius:3 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{size:10}}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:8},maxRotation:45}},
        y:{grid:{color:'#eee'},ticks:{callback:n=>fmt(n,0)}}
      }
    }
  });
}

// 芒聰聙芒聰聙 PARCELAMENTOS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function renderParc() {
  const active = allParc.filter(p => p['Ativo']==='Sim');
  if (!active.length) {
    document.getElementById('parcWrap').innerHTML='<div style="padding:16px;text-align:center;color:var(--muted)">Nenhum parcelamento ativo</div>';
    return;
  }
  const now = new Date();
  const cols = [];
  for (let i=0;i<6;i++) {
    const d = new Date(now.getFullYear(), now.getMonth()+i, 1);
    cols.push(`${MESES[d.getMonth()]}/${String(d.getFullYear()).slice(2)}`);
  }
  // Calcula offset de in脙颅cio a partir de Mes_Inicio (ex: "Jul/26")
  function startOffset(p) {
    const mi = (p['Mes_Inicio']||'').trim();
    if (!mi) return 0;
    const [mm,yy] = mi.split('/');
    const mIdx = MESES.indexOf(mm);
    if (mIdx<0) return 0;
    const diff = (2000+parseInt(yy) - now.getFullYear())*12 + mIdx - now.getMonth();
    return Math.max(0, diff);
  }
  const tots = new Array(6).fill(0);
  const rows = active.map(p => {
    const sar    = Math.abs(parseFloat(p['Valor_SAR']||0));
    const cur    = parseInt(p['Parcela_Atual']||1);
    const tot    = parseInt(p['Total_Parcelas']||1);
    const left   = tot - cur + 1;
    const offset = startOffset(p);
    const cells = cols.map((_,i) => {
      if (i>=offset && i<offset+left) { tots[i]+=sar; return `<td class="r neg">${fmt(sar,0)}</td>`; }
      return `<td class="r" style="color:var(--muted)">芒聙聰</td>`;
    });
    const desc = p['Descricao']||'芒聙聰';
    return `<tr>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${desc}">${desc}</td>
      <td class="r">${cur}/${tot}</td>
      <td class="r">${fmt(sar*tot,0)}</td>
      ${cells.join('')}
    </tr>`;
  }).join('');

  document.getElementById('parcWrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Item</th><th class="r">Parc.</th><th class="r">Total</th>
        ${cols.map(c=>`<th class="r">${c}</th>`).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td colspan="3">Total SAR/m脙陋s</td>
        ${tots.map(t=>`<td class="r">${fmt(t,0)}</td>`).join('')}
      </tr></tfoot>
    </table>`;
}

// 芒聰聙芒聰聙 ARABIA REAL 芒聙聰 barras horizontais 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function renderArabReal(trans) {
  // Soma de despesas por categoria (apenas negativos)
  const raw = {};
  trans
    .filter(t => ((t['Pais/Conta']||'').includes('Arabia') || t['Moeda']==='SAR') && v(t)<0)
    .forEach(t => {
      const cat = t['Categoria']||'Outros';
      raw[cat] = (raw[cat]||0) + Math.abs(v(t));
    });

  const sorted = Object.entries(raw)
    .sort((a,b)=>b[1]-a[1]).slice(0,14);
  if (!sorted.length) {
    document.getElementById('arabRealWrap').innerHTML='<div style="padding:16px;text-align:center;color:var(--muted)">Sem dados SAR</div>';
    return;
  }
  const max = sorted[0][1];
  document.getElementById('arabRealWrap').innerHTML = sorted.map(([cat,val]) => {
    const pct = (val/max)*100;
    return `<div class="hb">
      <div class="hb-lbl" title="${cat}">${cat}</div>
      <div class="hb-track">
        <div class="hb-fill" style="width:${pct}%">
          <span class="hb-val">${fmt(val,0)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

    [allTrans,allOrc,allParc] = await Promise.all([

    ]);

}
