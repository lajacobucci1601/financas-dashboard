<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#f0ece3; --card:#fff; --header:#3b2a1a; --bar:#5c3d1e;
  --green:#27ae60; --red:#e74c3c; --blue:#2980b9; --orange:#e67e22;
  --purple:#8e44ad; --text:#2c1a0e; --muted:#8a7060; --border:#ddd3c7;
  --shadow:0 2px 10px rgba(0,0,0,0.07);
}
body { font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:var(--text); }

/* HEADER */
header { background:var(--header); color:#fff; padding:11px 20px; display:flex; align-items:center; justify-content:space-between; }
header h1 { font-size:1.1rem; font-weight:700; }
header .sub { font-size:0.7rem; opacity:.55; }
#lastUpdate { font-size:0.7rem; opacity:.6; }

/* CONTROLS */
.ctrl { background:var(--bar); padding:7px 20px; display:flex; align-items:center; gap:12px; }
.ctrl label { color:rgba(255,255,255,.75); font-size:.72rem; font-weight:600; }
.ctrl select { background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3); border-radius:5px; padding:4px 10px; font-size:.78rem; cursor:pointer; }
.ctrl select option { background:var(--bar); }

/* KPIs — 4 colunas */
.kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; padding:12px 20px 8px; }
.kpi { background:var(--card); border-radius:10px; padding:13px 16px; box-shadow:var(--shadow); border-top:3px solid var(--blue); }
.kpi.red    { border-top-color:var(--red); }
.kpi.green  { border-top-color:var(--green); }
.kpi.orange { border-top-color:var(--orange); }
.kpi.blue   { border-top-color:var(--blue); }
.kpi.purple { border-top-color:var(--purple); }
.kpi-lbl { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; line-height:1.3; }
.kpi-val { font-size:1.25rem; font-weight:700; margin-bottom:2px; }
.kpi-sub { font-size:.6rem; color:var(--muted); }

/* MAIN GRID */
.main { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:8px 20px 16px; }
.card { background:var(--card); border-radius:10px; padding:14px 16px; box-shadow:var(--shadow); }
.card h2 { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.chart-wrap { height:220px; position:relative; }

/* HORIZONTAL BARS */
.hb { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.hb-lbl { font-size:.62rem; color:var(--text); width:105px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hb-track { flex:1; background:#f0ece3; border-radius:3px; height:14px; position:relative; }
.hb-fill { background:var(--red); border-radius:3px; height:14px; display:flex; align-items:center; justify-content:flex-end; padding-right:4px; min-width:28px; }
.hb-val { font-size:.58rem; font-weight:700; color:#fff; white-space:nowrap; }

/* PARCELAMENTOS */
#parcWrap table { width:100%; border-collapse:collapse; font-size:.65rem; }
#parcWrap th { background:#f7f3ee; padding:4px 6px; text-align:left; font-weight:600; color:var(--muted); font-size:.6rem; border-bottom:1px solid var(--border); }
#parcWrap td { padding:3px 6px; border-bottom:1px solid #f5f0eb; }
#parcWrap tfoot td { font-weight:700; background:#f7f3ee; border-top:2px solid var(--border); }
td.r { text-align:right; }
td.neg { color:var(--red); }

/* INVESTIMENTOS */
#investWrap { font-size:.72rem; }
.invest-total { display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
.invest-total .val { font-size:1.4rem; font-weight:700; }
.invest-total .lbl { font-size:.65rem; color:var(--muted); }

/* FULL WIDTH */
.full { grid-column:1/-1; }

@media(max-width:600px){
  .main { grid-template-columns:1fr; }
  .kpi-row { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<header>
  <div>
    <h1>💰 Dashboard Financeiro</h1>
    <div class="sub">Controle mensal · Saudi Arabia & Spain</div>
  </div>
  <div id="lastUpdate">—</div>
</header>

<div class="ctrl">
  <label>Mês:</label>
  <select id="selMes" onchange="applyFilter()"></select>
</div>

<div class="kpi-row" id="kpiRow">
  <div class="kpi"><div class="kpi-lbl">Carregando…</div></div>
</div>

<div class="main">

  <!-- Arabia SAR Plan vs Real -->
  <div class="card">
    <h2><img src="https://flagcdn.com/16x12/sa.png"> Arabia SAR — Plan vs Real</h2>
    <div class="chart-wrap"><canvas id="cArab"></canvas></div>
  </div>

  <!-- Arabia Real Breakdown -->
  <div class="card">
    <h2><img src="https://flagcdn.com/16x12/sa.png"> Arabia SAR — Real Breakdown</h2>
    <div id="arabRealWrap"></div>
  </div>

  <!-- Spain EUR Plan vs Real -->
  <div class="card">
    <h2><img src="https://flagcdn.com/16x12/es.png"> Spain EUR — Plan vs Real</h2>
    <div class="chart-wrap"><canvas id="cEsp"></canvas></div>
  </div>

  <!-- Investimentos -->
  <div class="card">
    <h2>📈 Investimentos & Poupança</h2>
    <div id="investWrap"></div>
  </div>

  <!-- Parcelamentos full width -->
  <div class="card full">
    <h2>💳 Parcelamentos Ativos</h2>
    <div id="parcWrap"></div>
  </div>

</div>

<script>
const SHEET_ID = '1kSEFGEhfJNmvplEkRQqCXFCVmQ_J7rVFQXgkCFMvaqI';
const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

let allTrans=[], allOrc=[], allParc=[], allPortfolio=[], resumo={};
let taxa_sar_live=null, taxa_brl_live=null;
let chartInst={};

function fmt(n,d=0){return Number(n).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});}

function gviz(sheet) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}`;
  return fetch(url).then(r=>r.text()).then(txt=>{
    const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const cols = json.table.cols.map(c=>c.label);
    return (json.table.rows||[]).map(row=>{
      const obj={};
      cols.forEach((c,i)=>{
        const cell=row.c[i];
        obj[c]=cell?.(cell.v??cell.f??''):'';
      });
      return obj;
    });
  });
}

function parseMesAno(str) {
  if (!str) return null;
  // Format: Date(y,m,d) from Google Sheets
  const dm = String(str).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (dm) return `${MESES[parseInt(dm[2])]}/${String(dm[1]).slice(2)}`;
  // Format: m/d/yyyy
  const us = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (us) return `${MESES[parseInt(us[1])-1]}/${String(us[3]).slice(2)}`;
  // Format already Mmm-YY or Mmm/YY
  const already = String(str).match(/^([A-Za-z]{3})[-\/](\d{2})$/);
  if (already) return `${already[1]}/${already[2]}`;
  return str;
}

function addMeses(mesAno, n) {
  if (!mesAno) return null;
  const [m, y] = mesAno.split('/');
  const mIdx = MESES.indexOf(m);
  if (mIdx < 0) return null;
  const total = mIdx + n;
  const newY = (2000 + parseInt(y)) + Math.floor(total / 12);
  const newM = ((total % 12) + 12) % 12;
  return `${MESES[newM]}/${String(newY).slice(2)}`;
}

function addN(mesAno, n) { return addMeses(mesAno, n); }

function mesAnoToNum(ma) {
  if (!ma) return 0;
  const [m, y] = ma.split('/');
  return (2000 + parseInt(y)) * 12 + MESES.indexOf(m);
}

function calcPlanValue(o, currentMesAno) {
  const rawVal = parseFloat(o['Valor'] || 0);
  if (!rawVal) return 0;

  const freq = (o['Frequencia'] || 'Mensal').trim();
  const mesInicioRaw = o['Mes_Inicio'] || o['Inicio'] || '';
  const mesInicio = parseMesAno(mesInicioRaw) || currentMesAno;

  if (freq === 'Mensal') return Math.abs(rawVal);

  const periodo = freq === 'Bimestral' ? 2
    : freq === 'Trimestral' ? 3
    : freq === 'Quadrimestral' ? 4
    : freq === 'Semestral' ? 6
    : freq === 'Anual' ? 12 : 1;

  if (periodo <= 1) return Math.abs(rawVal);

  const diff = mesAnoToNum(currentMesAno) - mesAnoToNum(mesInicio);
  if (diff < 0) return 0;
  return diff % periodo === 0 ? Math.abs(rawVal) : 0;
}

function v(t) {
  return parseFloat(t['Valor_EUR'] || t['Valor'] || 0);
}

function fmtDate(d) {
  if (!d) return '';
  const dm = String(d).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (dm) { const dt=new Date(dm[1],dm[2],dm[3]); return dt.toLocaleDateString('pt-BR'); }
  return d;
}

function mkChart(id, cfg) {
  if (chartInst[id]) { chartInst[id].destroy(); delete chartInst[id]; }
  const canvas = document.getElementById(id);
  if (!canvas) return;
  chartInst[id] = new Chart(canvas.getContext('2d'), cfg);
}

function buildSel() {
  const sel = document.getElementById('selMes');
  const meses = [...new Set(allTrans.map(t => parseMesAno(t['Mes_Ano'])).filter(Boolean))].sort((a,b)=>mesAnoToNum(a)-mesAnoToNum(b));
  sel.innerHTML = meses.map(m=>`<option value="${m}">${m}</option>`).join('');
  if (meses.length) sel.value = meses[meses.length-1];
}

function filtered() {
  const sel = document.getElementById('selMes').value;
  return allTrans.filter(t => parseMesAno(t['Mes_Ano']) === sel);
}

/* remap Categoria/Grupo */
const REMAPS = [
  { match: t => (t['Descricao']||'').toLowerCase().includes('aluguel') && (t['Grupo']||'')==='Arabia Saudita', set: { Categoria:'Moradia', Grupo:'Arabia Saudita' } },
];
function applyRemaps(rows) { rows.forEach(t => REMAPS.forEach(r => { if(r.match(t)) Object.assign(t, r.set); })); }

function parcForMes(mesAno) {
  if (!mesAno) return 0;
  return allParc
    .filter(p => p['Ativo']==='Sim')
    .reduce((s, p) => {
      const inicio = parseMesAno(p['Inicio'] || p['Mes_Inicio'] || '');
      const tot = parseInt(p['Total_Parcelas'] || 1);
      const iniNum = mesAnoToNum(inicio);
      const fimNum = iniNum + tot - 1;
      const selNum = mesAnoToNum(mesAno);
      if (selNum >= iniNum && selNum <= fimNum) {
        return s + Math.abs(parseFloat(p['Valor_SAR'] || 0));
      }
      return s;
    }, 0);
}

function renderKPIs(trans) {
  const taxa_sar = (taxa_sar_live) || resumo['Taxa_EUR_SAR'] || 4.3008;
  const taxa_brl = (taxa_brl_live) || resumo['Taxa_EUR_BRL'] || 6.2;

  const currentMesAno = document.getElementById('selMes').value;
  const selMesSAR = currentMesAno;

  // Total SAR (Arabia): transações do grupo Arabia Saudita com valor negativo
  const arabTrans = trans.filter(t => t['Grupo']==='Arabia Saudita');
  const totSAR = arabTrans.reduce((s,t) => {
    const val = parseFloat(t['Valor_SAR'] || t['Valor'] || 0);
    return val < 0 ? s + Math.abs(val) : s;
  }, 0);

  // Total EUR (Espanha): transações do grupo Espanha com valor negativo (excluindo Salário)
  const eurTrans = trans.filter(t => t['Grupo']==='Espanha' && !(t['Categoria']||'').toLowerCase().includes('salário') && !(t['Categoria']||'').toLowerCase().includes('salario'));
  const totEUR = eurTrans.reduce((s,t) => {
    const val = v(t);
    return val < 0 ? s + Math.abs(val) : s;
  }, 0);

  // Saldo atual EUR (com Salário)
  const saldoAtual = trans.filter(t => t['Grupo']==='Espanha').reduce((s,t) => s + v(t), 0);

  // Previsto não debitado: itens do Orçamento Espanha ainda não lançados
  const mesProx = addN(currentMesAno, 2);
  const mesParc = addN(currentMesAno, 3);

  const lancadosCats = new Set(eurTrans.map(t => t['Categoria']));
  const prevNaoDebit = allOrc
    .filter(o => o['Ativo']==='Sim' && (o['Grupo']==='Espanha' || o['Grupo']==='GordaEspanha'))
    .reduce((s, o) => {
      const cat = o['Descricao'] || '';
      if (lancadosCats.has(cat)) return s;
      return s + calcPlanValue(o, currentMesAno);
    }, 0);

  const saldoPrev = saldoAtual - prevNaoDebit;

  // Saldo Planejado: orçamento total (todas moedas convertidas p/ EUR) para mês seguinte
  console.log(`\n========== DEBUG SALDO PLANEJADO (${mesProx}) ==========`);
  let saldoProx = 0;
  allOrc.filter(o => o['Ativo']==='Sim').forEach(o => {
    const moeda = (o['Moeda'] || 'EUR').trim();
    const periodo = parseInt(o['Periodo'] || o['Frequencia_Num'] || 1) || 1;
    const rawVal = parseFloat(o['Valor'] || 0);
    if (!rawVal) return;
    let planVal = calcPlanValue(o, mesProx);
    if (!planVal) return;
    let valEUR = planVal;
    if (moeda === 'SAR') valEUR = valEUR / taxa_sar;
    else if (moeda === 'BRL') valEUR = valEUR / taxa_brl;
    if (rawVal < 0) valEUR = -valEUR;
    const tipo = rawVal > 0 ? 'Receita' : 'Despesa';
    const periodoStr = periodo && periodo > 1 ? ` (${periodo}m)` : '';
    console.log(`✓ ${tipo}: ${o['Descricao']||'?'} | Valor:${rawVal} ${moeda} | valEUR:${valEUR.toFixed(2)}${periodoStr}`);
    saldoProx += valEUR;
  });
  console.log(`\n--- FIM DEBUG ---\n`);
  const parcProxSAR = parcForMes(mesParc);
  const parcProxEUR = parcProxSAR / taxa_sar;
  console.log(`\n- Parcelas (${mesParc}): ${parcProxSAR} SAR = ${parcProxEUR.toFixed(2)} EUR`);
  saldoProx -= parcProxEUR;
  console.log(`\n= TOTAL SALDO PLANEJADO: ${saldoProx.toFixed(2)} EUR\n`);

  const proxLabel = mesProx || 'próximo';
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi red"><div class="kpi-lbl"><img src="https://flagcdn.com/16x12/sa.png" style="vertical-align:middle;margin-right:3px"> Total Expenses<br>Saudi Arabia (mês atual)</div><div class="kpi-val">${fmt(totSAR,0)} SAR</div><div class="kpi-sub">SAB_Card do mês + Aluguel (KSA) + Parcelas ${addN(selMesSAR,1)||''}</div></div>
    <div class="kpi orange"><div class="kpi-lbl"><img src="https://flagcdn.com/16x12/es.png" style="vertical-align:middle;margin-right:3px"> Total Expenses<br>Spain (até o momento)</div><div class="kpi-val">€ ${fmt(totEUR,2)}</div><div class="kpi-sub">BBVA — saldo do mês (sem Salário)</div></div>
    <div class="kpi green"><div class="kpi-lbl">💶 Balance Spain<br>(real até agora)</div><div class="kpi-val">€ ${fmt(saldoAtual,2)}</div><div class="kpi-sub">BBVA — saldo do mês (com Salário)</div></div>
    <div class="kpi blue"><div class="kpi-lbl">🔮 Balance Spain<br>(real + previsto mês)</div><div class="kpi-val">€ ${fmt(saldoPrev,2)}</div><div class="kpi-sub">Saldo real − Previsto não debitado (€ ${fmt(prevNaoDebit,2)})</div></div>
    <div class="kpi purple"><div class="kpi-lbl">📅 Saldo Planejado<br>${proxLabel}</div><div class="kpi-val">€ ${fmt(saldoProx,2)}</div><div class="kpi-sub">Orçamento (todas as moedas) − Parcelas (${mesParc||''})</div></div>`;
}

function renderEspanha(trans) {
  const currentMesAno = document.getElementById('selMes').value;
  const planMap = {};

  // Plan: apenas Grupo="Espanha" do Orcamento, agrupado por Descricao
  allOrc
    .filter(o => o['Grupo']==='Espanha' && o['Ativo']==='Sim')
    .forEach(o => {
      const cat = o['Descricao'] || 'Outros';
      planMap[cat] = (planMap[cat]||0) + calcPlanValue(o, currentMesAno);
    });

  // Real: apenas Grupo="Espanha" das Transacoes, agrupado por Categoria
  const realRaw = {};
  trans
    .filter(t => t['Grupo']==='Espanha')
    .forEach(t => {
      const cat = t['Categoria']||'Outros';
      realRaw[cat] = (realRaw[cat]||0) + v(t);
    });
  const realMap = {};
  Object.entries(realRaw).forEach(([c, net]) => { if (net < 0) realMap[c] = Math.abs(net); });

  const cats = [...new Set([...Object.keys(planMap),...Object.keys(realMap)])]
    .filter(c => !c.toLowerCase().includes('receita'))
    .sort((a,b) => (planMap[b]||0)-(planMap[a]||0));
  mkChart('cEsp',{type:'bar',data:{labels:cats,datasets:[{label:'Real (€)',data:cats.map(c=>realMap[c]||0),backgroundColor:'rgba(231,76,60,0.8)',borderRadius:3},{label:'Plan (€)',data:cats.map(c=>planMap[c]||0),backgroundColor:'rgba(39,174,96,0.7)',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10}}}},scales:{x:{grid:{display:false},ticks:{font:{size:8},maxRotation:45}},y:{type:'logarithmic',min:1,grid:{color:'#eee'},ticks:{callback:n=>{const vv=Number(n);if(vv===0)return'';if([1,10,100,500,1000,2000,5000].includes(vv))return'€'+fmt(vv,0);return null;}}}}}});
}

function renderArabia(trans) {
  const planMap = {};

  // Plan: apenas Grupo="Arabia Saudita" do Orcamento, agrupado por Descricao
  allOrc
    .filter(o => o['Grupo']==='Arabia Saudita' && o['Ativo']==='Sim')
    .forEach(o => {
      const cat = o['Descricao'] || 'Outros';
      planMap[cat] = (planMap[cat]||0) + calcPlanValue(o, document.getElementById('selMes').value);
    });

  // Real: apenas Grupo="Arabia Saudita" das Transacoes, agrupado por Categoria
  const realRaw = {};
  trans
    .filter(t => t['Grupo']==='Arabia Saudita')
    .forEach(t => {
      const cat = t['Categoria']||'Outros';
      realRaw[cat] = (realRaw[cat]||0) + v(t);
    });
  const realMap = {};
  Object.entries(realRaw).forEach(([c,val]) => { if (val<0) realMap[c]=Math.abs(val); });
  const cats = [...new Set([...Object.keys(planMap),...Object.keys(realMap)])].filter(c => !c.toLowerCase().includes('receita')).sort((a,b) => (planMap[b]||0)-(planMap[a]||0));
  mkChart('cArab',{type:'bar',options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10}}}},scales:{x:{grid:{display:false},ticks:{font:{size:8},maxRotation:45}},y:{type:'logarithmic',min:1,grid:{color:'#eee'},ticks:{callback:n=>{const vv=Number(n);if(vv===0)return'';if([1,10,100,500,1000,5000,10000,20000].includes(vv))return fmt(vv,0);return null;}}}}},data:{labels:cats,datasets:[{label:'Real (SAR)',data:cats.map(c=>realMap[c]||0),backgroundColor:'rgba(231,76,60,0.8)',borderRadius:3},{label:'Plan (SAR)',data:cats.map(c=>planMap[c]||0),backgroundColor:'rgba(39,174,96,0.7)',borderRadius:3}]}});
}

function renderParc() {
  const active = allParc.filter(p => p['Ativo']==='Sim');
  if (!active.length) { document.getElementById('parcWrap').innerHTML='<div style="padding:16px;text-align:center;color:var(--muted)">Nenhum parcelamento ativo</div>'; return; }
  const now = new Date();
  const cols = [];
  for (let i=0;i<6;i++) { const d=new Date(now.getFullYear(),now.getMonth()+i,2); cols.push(`${MESES[d.getMonth()]}/${String(d.getFullYear()).slice(2)}`); }
  function startOffset(p) {
    const mi = (p['Inicio']||p['Mes_Inicio']||'').trim();
    if (!mi) return 0;
    const [mm,yy] = mi.split('/');
    const mIdx = MESES.indexOf(mm);
    if (mIdx<0) return 0;
    const diff = (2000+parseInt(yy)-now.getFullYear())*12 + mIdx - now.getMonth();
    return Math.max(0,diff);
  }
  const tots = new Array(6).fill(0);
  const rows = active.map(p => {
    const sar=Math.abs(parseFloat(p['Valor_SAR']||0)),cur=parseInt(p['Parcela_Atual']||1),tot=parseInt(p['Total_Parcelas']||1),left=tot-cur+1,offset=startOffset(p);
    const cells=cols.map((_,i)=>{if(i>=offset&&i<offset+left){tots[i]+=sar;return `<td class="r neg">${fmt(sar,0)}</td>`;}return `<td class="r" style="color:var(--muted)">—</td>`;});
    const desc=p['Descricao']||'—';
    return `<tr><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${desc}">${desc}</td><td class="r">${cur}/${tot}</td><td class="r">${fmt(sar*tot,0)}</td>${cells.join('')}</tr>`;
  }).join('');
  document.getElementById('parcWrap').innerHTML=`<table><thead><tr><th>Item</th><th class="r">Parc.</th><th class="r">Total</th>${cols.map(c=>`<th class="r">${c}</th>`).join('')}</tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="3">Total SAR/mês</td>${tots.map(t=>`<td class="r">${fmt(t,0)}</td>`).join('')}</tr></tfoot></table>`;
}

const PALETTE = ['#4A90D9','#F5A623','#7ED321','#F7931A','#9B59B6','#1ABC9C','#E74C3C','#3498DB','#E67E22','#2ECC71','#E91E63','#00BCD4','#FF5722','#607D8B','#8BC34A','#FFC107','#795548','#9E9E9E'];

function renderInvest() {
  const ativos = allPortfolio.filter(p => p['Ativo'] && parseFloat(p['Valor_EUR']||0)>0).sort((a,b)=>parseFloat(b['Valor_EUR']||0)-parseFloat(a['Valor_EUR']||0));
  const totalPort = ativos.reduce((s,p)=>s+parseFloat(p['Valor_EUR']||0),0);
  const total = totalPort || resumo['Saldo_Poupanca_EUR']||0;
  const falta=resumo['Falta_Meta_EUR']||0,pct=Math.min((total/200000)*100,100),meses=resumo['Meses_Para_Meta']||0,previsao=resumo['Previsao_Meta']||'—',ritmo=resumo['Ritmo_Jan2028_EUR']||0;

  const donutHtml = ativos.length ? `
    <div style="display:flex;align-items:center;gap:10px;margin:10px 0">
      <div style="position:relative;width:110px;height:110px;flex-shrink:0">
        <canvas id="cPortfolio" width="110" height="110"></canvas>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none">
          <div style="font-size:.7rem;font-weight:700;color:var(--text)">€ ${fmt(totalPort,0)}</div>
          <div style="font-size:.55rem;color:var(--muted)">Positions</div>
        </div>
      </div>
      <div style="flex:1;max-height:110px;overflow-y:auto;font-size:.6rem;line-height:1.7">
        ${ativos.map((p,i)=>{
          const val=parseFloat(p['Valor_EUR']||0);
          const pct=(val/totalPort*100).toFixed(2);
          const cor=p['Cor']||PALETTE[i%PALETTE.length];
          return `<div style="display:flex;align-items:center;gap:4px">
            <span style="width:8px;height:8px;border-radius:50%;background:${cor};flex-shrink:0;display:inline-block"></span>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)" title="${p['Ativo']}">${p['Ativo']}</span>
            <span style="color:var(--muted);flex-shrink:0">${pct}%</span>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  document.getElementById('investWrap').innerHTML=`
  <div class="invest-total"><div class="val">€ ${fmt(total,0)}</div><div class="lbl">Poupança atual</div></div>
  <div style="background:#ede8e0;border-radius:8px;height:10px;margin:6px 0"><div style="background:var(--green);border-radius:8px;height:10px;width:${pct}%"></div></div>
  <div style="font-size:.67rem;color:var(--muted);line-height:1.6">
    <div>📌 Falta: <b>€ ${fmt(falta,0)}</b> para meta €200k</div>
    <div>📅 Previsão: <b>${previsao}</b> (${fmt(meses,1)} meses)</div>
    <div>⚡ Ritmo p/ Jan/2028: <b>€ ${fmt(ritmo,0)}/mês</b></div>
  </div>
  ${donutHtml}`;

  if (ativos.length) {
    const colors = ativos.map((p,i) => p['Cor']||PALETTE[i%PALETTE.length]);
    mkChart('cPortfolio',{
      type:'doughnut',
      data:{
        labels: ativos.map(p=>p['Ativo']),
        datasets:[{data:ativos.map(p=>parseFloat(p['Valor_EUR']||0)),backgroundColor:colors,borderWidth:1,borderColor:'#fff'}]
      },
      options:{
        responsive:false,
        cutout:'70%',
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const vv=ctx.parsed;const pc=(vv/totalPort*100).toFixed(1);return ` ${ctx.label}: € ${fmt(vv,0)} (${pc}%)`;}}}},
        animation:{duration:600}
      }
    });
  }
}

function renderArabReal(trans) {
  const raw = {};
  trans.filter(t => t['Moeda_Class']==='SAR').forEach(t => {
    const cat=t['Categoria']||'Outros';
    raw[cat]=(raw[cat]||0)+v(t);
  });
  const sorted=Object.entries(raw).filter(([,v])=>v<0).map(([c,v])=>[c,Math.abs(v)]).sort((a,b)=>b[1]-a[1]).slice(0,14);
  if (!sorted.length) { document.getElementById('arabRealWrap').innerHTML='<div style="padding:16px;text-align:center;color:var(--muted)">Sem dados SAR</div>'; return; }
  const max=sorted[0][1];
  document.getElementById('arabRealWrap').innerHTML=sorted.map(([cat,val])=>`<div class="hb"><div class="hb-lbl" title="${cat}">${cat}</div><div class="hb-track"><div class="hb-fill" style="width:${(val/max)*100}%"><span class="hb-val">${fmt(val,0)}</span></div></div></div>`).join('');
}

function applyFilter() {
  const trans=filtered();
  renderKPIs(trans);
  renderEspanha(trans);
  renderArabia(trans);
  renderArabReal(trans);
}

async function fetchLiveRates() {
  try {
    const resp = await fetch('https://open.er-api.com/v6/latest/EUR');
    if (!resp.ok) throw new Error('API erro');
    const data = await resp.json();
    taxa_sar_live = data.rates.SAR;
    taxa_brl_live = data.rates.BRL;
  } catch(e) {
    console.warn('Não conseguiu buscar taxas ao vivo, usando fallback:', e.message);
    taxa_sar_live = null;
    taxa_brl_live = null;
  }
}

async function init() {
  try {
    console.log('\n\n========== DASHBOARD INICIANDO (v2.0) ==========\n');
    [allTrans,allOrc,allParc,allPortfolio]=await Promise.all([gviz('Transacoes'),gviz('Orcamento'),gviz('Parcelamentos'),gviz('Portfolio').catch(()=>[])]);
    console.log(`Carregado: ${allOrc.length} itens de Orçamento\n`);
    applyRemaps(allTrans);
    const resumoRows=await gviz('Resumo');
    resumo=resumoRows.length?resumoRows[resumoRows.length-1]:{};
    const att=resumo['Data_Atualizacao'];
    if(att) document.getElementById('lastUpdate').textContent='Atualizado: '+fmtDate(att);
    await fetchLiveRates();
    buildSel();
    applyFilter();
    renderParc();
    renderInvest();
  } catch(e) {
    console.error(e);
    document.getElementById('kpiRow').innerHTML=`<div style="color:var(--red);padding:20px;grid-column:1/-1">❌ Erro ao carregar. Verifique se a planilha está pública.<br><small>${e.message}</small></div>`;
  }
}

init();
</script>
</body>
</html>
